version: '3.8'

# AgriTech Local Development Environment
# This setup simulates production domains using Traefik reverse proxy
# All services accessible via *.local.thebzlab.online domains

services:
  # ===================================
  # REVERSE PROXY - Traefik
  # ===================================
  traefik:
    image: traefik:v3.0
    container_name: agritech-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Traefik dashboard
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--log.level=INFO"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - agritech-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.local.thebzlab.online`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.entrypoints=web"

  # ===================================
  # SUPABASE STACK
  # ===================================
  supabase-db:
    image: supabase/postgres:15.8.1.060
    container_name: agritech-supabase-db
    restart: unless-stopped
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
      POSTGRES_PORT: 5432
      POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD:-your-super-secret-db-password}
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
      JWT_EXP: 3600
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
      - ./supabase/init:/docker-entrypoint-initdb.d:ro
    networks:
      - agritech-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  supabase-vector:
    image: timberio/vector:0.28.1-alpine
    container_name: agritech-supabase-vector
    restart: unless-stopped
    volumes:
      - ./supabase/vector.yml:/etc/vector/vector.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY:-your-super-secret-logflare-key}
    networks:
      - agritech-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://vector:9001/health"]
      timeout: 5s
      interval: 5s
      retries: 3

  supabase-analytics:
    image: supabase/logflare:1.12.0
    container_name: agritech-supabase-analytics
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      LOGFLARE_NODE_HOST: 127.0.0.1
      DB_USERNAME: supabase_admin
      DB_DATABASE: _supabase
      DB_HOSTNAME: supabase-db
      DB_PORT: 5432
      DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-your-super-secret-db-password}
      DB_SCHEMA: _analytics
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY:-your-super-secret-logflare-key}
      LOGFLARE_SINGLE_TENANT: true
      LOGFLARE_SUPABASE_MODE: true
      LOGFLARE_MIN_CLUSTER_SIZE: 1
      POSTGRES_BACKEND_URL: postgresql://supabase_admin:${SUPABASE_DB_PASSWORD:-your-super-secret-db-password}@supabase-db:5432/_supabase
      POSTGRES_BACKEND_SCHEMA: _analytics
      LOGFLARE_FEATURE_FLAG_OVERRIDE: multibackend=true
    networks:
      - agritech-network
    healthcheck:
      test: ["CMD", "curl", "http://localhost:4000/health"]
      timeout: 5s
      interval: 5s
      retries: 10

  supabase-auth:
    image: supabase/gotrue:v2.171.0
    container_name: agritech-supabase-auth
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-analytics:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://agritech.local.thebzlab.online
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${SUPABASE_DB_PASSWORD:-your-super-secret-db-password}@supabase-db:5432/postgres
      GOTRUE_SITE_URL: http://agritech-dashboard.local.thebzlab.online
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
    networks:
      - agritech-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      timeout: 5s
      interval: 5s
      retries: 3

  supabase-rest:
    image: postgrest/postgrest:v12.2.11
    container_name: agritech-supabase-rest
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${SUPABASE_DB_PASSWORD:-your-super-secret-db-password}@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    networks:
      - agritech-network

  supabase-realtime:
    image: supabase/realtime:v2.34.47
    container_name: agritech-supabase-realtime
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-analytics:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: supabase-db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-your-super-secret-db-password}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-your-super-secret-key-base-at-least-64-characters}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: true
      RUN_JANITOR: true
    networks:
      - agritech-network
    healthcheck:
      test: ["CMD", "curl", "-sSfL", "--head", "-o", "/dev/null", "-H", "Authorization: Bearer ${ANON_KEY}", "http://localhost:4000/api/tenants/realtime-dev/health"]
      timeout: 5s
      interval: 5s
      retries: 3

  supabase-storage:
    image: supabase/storage-api:v1.22.7
    container_name: agritech-supabase-storage
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_started
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://supabase-rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
      DATABASE_URL: postgres://supabase_storage_admin:${SUPABASE_DB_PASSWORD:-your-super-secret-db-password}@supabase-db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://supabase-imgproxy:5001
    volumes:
      - supabase-storage-data:/var/lib/storage
    networks:
      - agritech-network

  supabase-imgproxy:
    image: darthsim/imgproxy:v3.8.0
    container_name: agritech-supabase-imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    volumes:
      - supabase-storage-data:/var/lib/storage
    networks:
      - agritech-network

  supabase-meta:
    image: supabase/postgres-meta:v0.88.9
    container_name: agritech-supabase-meta
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: supabase-db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-your-super-secret-db-password}
    networks:
      - agritech-network

  supabase-studio:
    image: supabase/studio:2025.04.21-sha-173cc56
    container_name: agritech-supabase-studio
    restart: unless-stopped
    depends_on:
      supabase-analytics:
        condition: service_healthy
    environment:
      STUDIO_PG_META_URL: http://supabase-meta:8080
      POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD:-your-super-secret-db-password}
      DEFAULT_ORGANIZATION_NAME: AgriTech
      DEFAULT_PROJECT_NAME: AgriTech Local
      SUPABASE_URL: http://agritech.local.thebzlab.online
      SUPABASE_PUBLIC_URL: http://agritech.local.thebzlab.online
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY:-your-super-secret-logflare-key}
      LOGFLARE_URL: http://supabase-analytics:4000
      NEXT_PUBLIC_ENABLE_LOGS: true
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
    networks:
      - agritech-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.supabase.rule=Host(`supabase.local.thebzlab.online`)"
      - "traefik.http.routers.supabase.entrypoints=web"
      - "traefik.http.services.supabase.loadbalancer.server.port=3000"

  supabase-kong:
    image: kong:2.8.1
    container_name: agritech-supabase-kong
    restart: unless-stopped
    depends_on:
      supabase-analytics:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ./supabase/kong.yml:/home/kong/temp.yml:ro
    entrypoint: bash -c 'eval "echo \"$$(cat ~/temp.yml)\"" > ~/kong.yml && /docker-entrypoint.sh kong docker-start'
    networks:
      - agritech-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agritech-supabase.rule=Host(`agritech.local.thebzlab.online`)"
      - "traefik.http.routers.agritech-supabase.entrypoints=web"
      - "traefik.http.services.agritech-supabase.loadbalancer.server.port=8000"

  # ===================================
  # AGRITECH SERVICES
  # ===================================

  # Frontend Dashboard (React/Vite)
  frontend:
    build:
      context: ./project
      dockerfile: Dockerfile
    container_name: agritech-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - VITE_SUPABASE_URL=http://agritech.local.thebzlab.online
      - VITE_SUPABASE_ANON_KEY=${ANON_KEY}
      - VITE_STRAPI_URL=http://cms.local.thebzlab.online
      - VITE_STRAPI_API_URL=http://cms.local.thebzlab.online/api
    depends_on:
      - supabase-kong
      - backend-service
      - strapi
    networks:
      - agritech-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agritech-dashboard.rule=Host(`agritech-dashboard.local.thebzlab.online`)"
      - "traefik.http.routers.agritech-dashboard.entrypoints=web"
      - "traefik.http.services.agritech-dashboard.loadbalancer.server.port=80"

  # Backend Service (Python - Satellite API)
  backend-service:
    build:
      context: ./backend-service
      dockerfile: Dockerfile
    container_name: agritech-backend-service
    restart: unless-stopped
    environment:
      - DEBUG=true
      - GEE_SERVICE_ACCOUNT=${GEE_SERVICE_ACCOUNT}
      - GEE_PRIVATE_KEY=${GEE_PRIVATE_KEY}
      - GEE_PROJECT_ID=${GEE_PROJECT_ID}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SUPABASE_URL=http://agritech.local.thebzlab.online
      - SUPABASE_ANON_KEY=${ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SERVICE_ROLE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}
    volumes:
      - satellite-data:/tmp/satellite-data
    networks:
      - agritech-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.satellite-api.rule=Host(`satellite-api.local.thebzlab.online`)"
      - "traefik.http.routers.satellite-api.entrypoints=web"
      - "traefik.http.services.satellite-api.loadbalancer.server.port=8000"

  # NestJS API
  agritech-api:
    build:
      context: ./agritech-api
      dockerfile: Dockerfile
      target: development
    container_name: agritech-api
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=3001
      - API_PREFIX=api/v1
      - SUPABASE_URL=http://agritech.local.thebzlab.online
      - SUPABASE_ANON_KEY=${ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
      - JWT_EXPIRES_IN=1d
      - DATABASE_URL=${DATABASE_URL}
      - CORS_ORIGIN=*
      - LOG_LEVEL=debug
      - RATE_LIMIT_TTL=60
      - RATE_LIMIT_MAX=100
    volumes:
      - ./agritech-api:/app
      - /app/node_modules
    depends_on:
      - supabase-kong
    networks:
      - agritech-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agritech-api.rule=Host(`agritech-api.local.thebzlab.online`)"
      - "traefik.http.routers.agritech-api.entrypoints=web"
      - "traefik.http.services.agritech-api.loadbalancer.server.port=3001"

  # Strapi CMS
  strapi:
    build:
      context: ./cms
      dockerfile: Dockerfile
    container_name: agritech-strapi
    restart: unless-stopped
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: strapi-db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${STRAPI_DB_NAME:-agritech_strapi}
      DATABASE_USERNAME: ${STRAPI_DB_USER:-strapi}
      DATABASE_PASSWORD: ${STRAPI_DB_PASSWORD:-strapi-password}
      DATABASE_SSL: false
      JWT_SECRET: ${STRAPI_JWT_SECRET}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      APP_KEYS: ${STRAPI_APP_KEYS}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
      NODE_ENV: development
      STRAPI_ADMIN_BACKEND_URL: http://cms.local.thebzlab.online
    volumes:
      - ./cms:/srv/app
      - /srv/app/node_modules
    depends_on:
      - strapi-db
    networks:
      - agritech-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cms.rule=Host(`cms.local.thebzlab.online`)"
      - "traefik.http.routers.cms.entrypoints=web"
      - "traefik.http.services.cms.loadbalancer.server.port=1337"

  # Strapi Database
  strapi-db:
    image: postgres:15-alpine
    container_name: agritech-strapi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${STRAPI_DB_USER:-strapi}
      POSTGRES_PASSWORD: ${STRAPI_DB_PASSWORD:-strapi-password}
      POSTGRES_DB: ${STRAPI_DB_NAME:-agritech_strapi}
    volumes:
      - strapi-db-data:/var/lib/postgresql/data
    networks:
      - agritech-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STRAPI_DB_USER:-strapi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================================
  # OPTIONAL SERVICES
  # ===================================

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: agritech-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - agritech-network
    labels:
      - "traefik.enable=true"
      # MinIO Console
      - "traefik.http.routers.minio-console.rule=Host(`minio.local.thebzlab.online`)"
      - "traefik.http.routers.minio-console.entrypoints=web"
      - "traefik.http.routers.minio-console.service=minio-console"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
      # MinIO S3 API
      - "traefik.http.routers.s3.rule=Host(`s3.local.thebzlab.online`)"
      - "traefik.http.routers.s3.entrypoints=web"
      - "traefik.http.routers.s3.service=s3"
      - "traefik.http.services.s3.loadbalancer.server.port=9000"

  # Adminer (Database Management)
  adminer:
    image: adminer:4.8.1
    container_name: agritech-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: supabase-db
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      - supabase-db
      - strapi-db
    networks:
      - agritech-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adminer.rule=Host(`adminer.local.thebzlab.online`)"
      - "traefik.http.routers.adminer.entrypoints=web"
      - "traefik.http.services.adminer.loadbalancer.server.port=8080"

networks:
  agritech-network:
    driver: bridge
    name: agritech-local-network

volumes:
  supabase-db-data:
  supabase-storage-data:
  strapi-db-data:
  satellite-data:
  minio-data:
