services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOCS_USERNAME: ${DOCS_USERNAME:-admin}
        DOCS_PASSWORD: ${DOCS_PASSWORD:-changeme}
    container_name: agritech-docs
    ports:
      - "${DOCS_PORT:-9473}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
