services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_API_URL=${VITE_API_URL}
        - VITE_AUTH_SUPABASE_URL=${VITE_AUTH_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_AUTH_SUPABASE_ANON_KEY=${VITE_AUTH_SUPABASE_ANON_KEY}
        - VITE_SATELLITE_SERVICE_URL=${VITE_SATELLITE_SERVICE_URL}
        - VITE_SATELLITE_PROVIDER=${VITE_SATELLITE_PROVIDER:-}
        - VITE_POLAR_ACCESS_TOKEN=${VITE_POLAR_ACCESS_TOKEN:-}
        - VITE_POLAR_ORGANIZATION_ID=${VITE_POLAR_ORGANIZATION_ID:-}
        - POLAR_WEBHOOK_SECRET=${POLAR_WEBHOOK_SECRET:-}
        - VITE_POLAR_SERVER=${VITE_POLAR_SERVER:-sandbox}
        - VITE_POLAR_CHECKOUT_URL=${VITE_POLAR_CHECKOUT_URL:-}
        - VITE_POLAR_ESSENTIAL_PRODUCT_ID=${VITE_POLAR_ESSENTIAL_PRODUCT_ID:-}
        - VITE_POLAR_PROFESSIONAL_PRODUCT_ID=${VITE_POLAR_PROFESSIONAL_PRODUCT_ID:-}
        - VITE_POLAR_ENTERPRISE_PRODUCT_ID=${VITE_POLAR_ENTERPRISE_PRODUCT_ID:-}
        - VITE_APP_URL=${VITE_APP_URL}
        - VITE_MARKETPLACE_URL=${VITE_MARKETPLACE_URL:-}
    container_name: agritech-frontend
    ports:
      - "3002:80"
    restart: unless-stopped
    networks:
      - agritech-network
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-dokploy-network}
      # Loadbalancer: nginx serves on port 80 (ports 3002:80)
      - traefik.http.services.frontend.loadbalancer.server.port=80
      # Traefik.me domain (set DASHBOARD_TRAEFIK_HOST in compose env)
      - traefik.http.routers.frontend-traefik-web.rule=Host(`${DASHBOARD_TRAEFIK_HOST:-localhost}`)
      - traefik.http.routers.frontend-traefik-web.entrypoints=web
      - traefik.http.routers.frontend-traefik-web.service=frontend
      - traefik.http.routers.frontend-traefik-web.middlewares=redirect-to-https@file
      - traefik.http.routers.frontend-traefik-websecure.rule=Host(`${DASHBOARD_TRAEFIK_HOST:-localhost}`)
      - traefik.http.routers.frontend-traefik-websecure.entrypoints=websecure
      - traefik.http.routers.frontend-traefik-websecure.service=frontend
      - traefik.http.routers.frontend-traefik-websecure.tls.certresolver=letsencrypt
      # Custom domain (set DASHBOARD_PUBLIC_HOST in compose env, e.g. agriprofy.wearecodelovers.com)
      - traefik.http.routers.frontend-custom-web.rule=Host(`${DASHBOARD_PUBLIC_HOST:-custom-domain-placeholder.invalid}`)
      - traefik.http.routers.frontend-custom-web.entrypoints=web
      - traefik.http.routers.frontend-custom-web.service=frontend
      - traefik.http.routers.frontend-custom-web.middlewares=redirect-to-https@file
      - traefik.http.routers.frontend-custom-websecure.rule=Host(`${DASHBOARD_PUBLIC_HOST:-custom-domain-placeholder.invalid}`)
      - traefik.http.routers.frontend-custom-websecure.entrypoints=websecure
      - traefik.http.routers.frontend-custom-websecure.service=frontend
      - traefik.http.routers.frontend-custom-websecure.tls.certresolver=letsencrypt

networks:
  agritech-network:
    driver: bridge
  dokploy-network:
    external: true
