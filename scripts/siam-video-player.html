<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AgroGina SIAM 2026 Player</title>
  <style>
    html, body {
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }

    body {
      position: relative;
      cursor: none;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: block;
      background: #000;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      z-index: 2;
    }

    .overlay span {
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.5);
      color: rgba(255, 255, 255, 0.92);
      font-size: 14px;
      letter-spacing: 0.02em;
    }

    .watermark {
      position: fixed;
      right: 16px;
      bottom: 14px;
      z-index: 3;
      color: rgba(29, 107, 58, 0.6);
      font-size: 14px;
      font-weight: 600;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
    }
  </style>
</head>
<body>
  <video id="player" loop autoplay muted playsinline preload="auto"></video>
  <div class="overlay" id="overlay"><span>Click to play</span></div>
  <div class="watermark">AgroGina</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const src = params.get('src') || 'siam-demo.mp4';
    const video = document.getElementById('player');
    const overlay = document.getElementById('overlay');

    video.src = src;

    async function requestFullscreen(el) {
      const fn = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
      if (fn) {
        try { await fn.call(el); } catch (_) {}
      }
    }

    function hideOverlay() {
      overlay.style.display = 'none';
    }

    async function startPlayback() {
      hideOverlay();
      await requestFullscreen(document.documentElement);
      try { await video.play(); } catch (_) {}
    }

    document.addEventListener('click', startPlayback, { once: true });
    document.addEventListener('touchstart', startPlayback, { once: true, passive: true });

    video.addEventListener('loadedmetadata', () => {
      video.play().catch(() => {});
    });
  </script>
</body>
</html>
