version: '3.8'

services:
  satellite-indices-service:
    build: .
    container_name: satellite-indices-service
    environment:
      - DEBUG=${DEBUG:-false}

      # Satellite Provider Configuration
      - SATELLITE_PROVIDER=${SATELLITE_PROVIDER:-auto}
      - SATELLITE_COMMERCIAL_MODE=${SATELLITE_COMMERCIAL_MODE:-false}

      # Google Earth Engine (GEE) Configuration
      - GEE_SERVICE_ACCOUNT=${GEE_SERVICE_ACCOUNT}
      - GEE_PRIVATE_KEY=${GEE_PRIVATE_KEY}
      - GEE_PROJECT_ID=${GEE_PROJECT_ID}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}

      # Copernicus Data Space Ecosystem (CDSE) Configuration
      - CDSE_CLIENT_ID=${CDSE_CLIENT_ID}
      - CDSE_CLIENT_SECRET=${CDSE_CLIENT_SECRET}
      - CDSE_OPENEO_URL=${CDSE_OPENEO_URL:-https://openeo.dataspace.copernicus.eu}

      # Supabase Configuration
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-${SUPABASE_SERVICE_KEY}}
    volumes:
      - ./temp-data:/tmp/satellite-data
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-dokploy-network}"
      - "traefik.http.services.satellite.loadbalancer.server.port=8000"
      # Traefik.me domain (set SATELLITE_TRAEFIK_HOST in compose env)
      - "traefik.http.routers.satellite-traefik-web.rule=Host(`${SATELLITE_TRAEFIK_HOST:-localhost}`)"
      - "traefik.http.routers.satellite-traefik-web.entrypoints=web"
      - "traefik.http.routers.satellite-traefik-web.service=satellite"
      - "traefik.http.routers.satellite-traefik-web.middlewares=redirect-to-https@file"
      - "traefik.http.routers.satellite-traefik-websecure.rule=Host(`${SATELLITE_TRAEFIK_HOST:-localhost}`)"
      - "traefik.http.routers.satellite-traefik-websecure.entrypoints=websecure"
      - "traefik.http.routers.satellite-traefik-websecure.service=satellite"
      - "traefik.http.routers.satellite-traefik-websecure.tls.certresolver=letsencrypt"
      # Custom domain (set SATELLITE_PUBLIC_HOST in compose env, e.g. satellite.wearecodelovers.com)
      - "traefik.http.routers.satellite-custom-web.rule=Host(`${SATELLITE_PUBLIC_HOST:-satellite-custom-placeholder.invalid}`)"
      - "traefik.http.routers.satellite-custom-web.entrypoints=web"
      - "traefik.http.routers.satellite-custom-web.service=satellite"
      - "traefik.http.routers.satellite-custom-web.middlewares=redirect-to-https@file"
      - "traefik.http.routers.satellite-custom-websecure.rule=Host(`${SATELLITE_PUBLIC_HOST:-satellite-custom-placeholder.invalid}`)"
      - "traefik.http.routers.satellite-custom-websecure.entrypoints=websecure"
      - "traefik.http.routers.satellite-custom-websecure.service=satellite"
      - "traefik.http.routers.satellite-custom-websecure.tls.certresolver=letsencrypt"
      - "dokploy=true"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  dokploy-network:
    external: true

volumes:
  temp-data: