name: EAS Update (OTA)

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '!mobile/eas.json'
      - '!mobile/app.json'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Update branch/channel'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      message:
        description: 'Update message'
        required: false
        default: 'OTA update'

concurrency:
  group: eas-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: EAS OTA Update
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Set update params
        id: params
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "branch=preview" >> $GITHUB_OUTPUT
            echo "message=Auto update from ${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ inputs.branch }}" >> $GITHUB_OUTPUT
            echo "message=${{ inputs.message }}" >> $GITHUB_OUTPUT
          fi

      - name: Publish OTA update
        run: eas update --branch ${{ steps.params.outputs.branch }} --message "${{ steps.params.outputs.message }}" --non-interactive
