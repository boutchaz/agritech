services:
  agritech-api:
    # Requires env: SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY, JWT_SECRET,
    # DATABASE_URL, CORS_ORIGIN, SUPABASE_NETWORK_NAME, EXTERNAL_NETWORK_NAME, API_PUBLIC_HOST, etc.
    build:
      context: ..
      dockerfile: agritech-api/Dockerfile
      target: production
    container_name: agritech-api
    expose:
      - "3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - API_PREFIX=${API_PREFIX:-api/v1}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1d}
      - DATABASE_URL=${DATABASE_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RATE_LIMIT_TTL=${RATE_LIMIT_TTL:-60}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
      - STRAPI_API_URL=${STRAPI_API_URL}
      - STRAPI_API_TOKEN=${STRAPI_API_TOKEN}
      - ZAI_API_KEY=${ZAI_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - FRONTEND_URL=${FRONTEND_URL}
      - SATELLITE_SERVICE_URL=${SATELLITE_SERVICE_URL}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-}
      - ALERT_COOLDOWN_MINUTES=${ALERT_COOLDOWN_MINUTES:-15}
      - HEALTH_CHECK_INTERVAL_SECONDS=${HEALTH_CHECK_INTERVAL_SECONDS:-60}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - ALERT_TELEGRAM_BOT_TOKEN=${ALERT_TELEGRAM_BOT_TOKEN:-}
      - ALERT_TELEGRAM_CHAT_ID=${ALERT_TELEGRAM_CHAT_ID:-}
      - SIAM_RDV_RECIPIENTS=${SIAM_RDV_RECIPIENTS:-}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - POLAR_ACCESS_TOKEN=${POLAR_ACCESS_TOKEN:-}
      - POLAR_ORGANIZATION_ID=${POLAR_ORGANIZATION_ID:-}
      - POLAR_WEBHOOK_SECRET=${POLAR_WEBHOOK_SECRET:-}
      - POLAR_SERVER=${POLAR_SERVER:-sandbox}
      - MAD_TO_USD_RATE=${MAD_TO_USD_RATE:-0.098}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/v1/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-dokploy-network}"
      - "traefik.http.services.agritech-api.loadbalancer.server.port=3001"
      # Traefik.me domain (set API_TRAEFIK_HOST in compose env)
      - "traefik.http.routers.agritech-api-traefik-web.rule=Host(`${API_TRAEFIK_HOST:-localhost}`)"
      - "traefik.http.routers.agritech-api-traefik-web.entrypoints=web"
      - "traefik.http.routers.agritech-api-traefik-web.service=agritech-api"
      - "traefik.http.routers.agritech-api-traefik-web.middlewares=redirect-to-https@file"
      - "traefik.http.routers.agritech-api-traefik-websecure.rule=Host(`${API_TRAEFIK_HOST:-localhost}`)"
      - "traefik.http.routers.agritech-api-traefik-websecure.entrypoints=websecure"
      - "traefik.http.routers.agritech-api-traefik-websecure.service=agritech-api"
      - "traefik.http.routers.agritech-api-traefik-websecure.tls.certresolver=letsencrypt"
      # Custom domain (set API_PUBLIC_HOST in compose env, e.g. api.wearecodelovers.com)
      - "traefik.http.routers.agritech-api-custom-web.rule=Host(`${API_PUBLIC_HOST:-api-custom-placeholder.invalid}`)"
      - "traefik.http.routers.agritech-api-custom-web.entrypoints=web"
      - "traefik.http.routers.agritech-api-custom-web.service=agritech-api"
      - "traefik.http.routers.agritech-api-custom-web.middlewares=redirect-to-https@file"
      - "traefik.http.routers.agritech-api-custom-websecure.rule=Host(`${API_PUBLIC_HOST:-api-custom-placeholder.invalid}`)"
      - "traefik.http.routers.agritech-api-custom-websecure.entrypoints=websecure"
      - "traefik.http.routers.agritech-api-custom-websecure.service=agritech-api"
      - "traefik.http.routers.agritech-api-custom-websecure.tls.certresolver=letsencrypt"
      # Headers / WebSocket
      - "traefik.http.middlewares.agritech-api-headers.headers.customrequestheaders.X-Forwarded-Host=${API_PUBLIC_HOST:-${API_TRAEFIK_HOST}}"
      - "traefik.http.middlewares.agritech-api-websocket.headers.customrequestheaders.Connection=upgrade"
      - "traefik.http.middlewares.agritech-api-websocket.headers.customrequestheaders.Upgrade=websocket"
    networks:
      - agritech-network
      - supabase-network
      - dokploy-network

  db-migrator:
    image: supabase/cli:2.72.7
    container_name: agritech-db-migrator
    profiles:
      - migrations
    working_dir: /workspace/project
    environment:
      - MIGRATIONS_DB_URL=${MIGRATIONS_DB_URL}
    command: >
      sh -lc '
      if [ -z "$MIGRATIONS_DB_URL" ]; then
        echo "MIGRATIONS_DB_URL is required";
        exit 1;
      fi;
      supabase migration list --db-url "$MIGRATIONS_DB_URL" &&
      supabase db push --db-url "$MIGRATIONS_DB_URL"
      '
    volumes:
      - ../project:/workspace/project
    restart: "no"
    networks:
      - supabase-network

networks:
  agritech-network:
    external: true
    name: ${EXTERNAL_NETWORK_NAME:-dokploy-network}
  # Use exact name from `docker network ls` (no _default suffix). Default: dokploy-network when no local Supabase.
  supabase-network:
    external: true
    name: ${SUPABASE_NETWORK_NAME:-dokploy-network}
  dokploy-network:
    external: true
