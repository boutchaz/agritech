services:
  # Strapi CMS - Development Mode
  strapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agritech-strapi-dev
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: strapi-db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${STRAPI_DB_NAME:-agritech_strapi}
      DATABASE_USERNAME: ${STRAPI_DB_USER:-strapi}
      DATABASE_PASSWORD: ${STRAPI_DB_PASSWORD}
      DATABASE_SSL: false
      JWT_SECRET: ${STRAPI_JWT_SECRET}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      APP_KEYS: ${STRAPI_APP_KEYS}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
      NODE_ENV: development
      STRAPI_ADMIN_BACKEND_URL: ${STRAPI_URL:-http://localhost:1337}
    volumes:
      # Mount source code for hot reloading in development
      - .:/srv/app
      - /srv/app/node_modules
    ports:
      - "1337:1337"
    networks:
      - strapi-network
    depends_on:
      - strapi-db
    command: npm run develop

  # Strapi PostgreSQL Database
  strapi-db:
    image: postgres:15-alpine
    container_name: agritech-strapi-db-dev
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${STRAPI_DB_USER:-strapi}
      POSTGRES_PASSWORD: ${STRAPI_DB_PASSWORD}
      POSTGRES_DB: ${STRAPI_DB_NAME:-agritech_strapi}
    volumes:
      - strapi-db-data-dev:/var/lib/postgresql/data
    networks:
      - strapi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STRAPI_DB_USER:-strapi}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  strapi-network:
    driver: bridge

volumes:
  strapi-db-data-dev:
