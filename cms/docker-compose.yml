services:
  # Strapi CMS
  strapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agritech-strapi
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: strapi-db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${STRAPI_DB_NAME:-agritech_strapi}
      DATABASE_USERNAME: ${STRAPI_DB_USER:-strapi}
      DATABASE_PASSWORD: ${STRAPI_DB_PASSWORD}
      DATABASE_SSL: false
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      NODE_ENV: ${NODE_ENV:-development}
      STRAPI_ADMIN_BACKEND_URL: ${STRAPI_URL:-http://localhost:1337}
    volumes:
      # Only mount uploads directory for persistent storage
      # Do NOT mount source code in production - it overwrites the built dist folder
      - ./public/uploads:/srv/app/public/uploads
    ports:
      - "1337:1337"
    networks:
      - strapi-network
      - dokploy-network
    depends_on:
      strapi-db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-dokploy-network}"
      - "traefik.http.services.strapi.loadbalancer.server.port=1337"
      # Traefik.me domain (set CMS_TRAEFIK_HOST in compose env)
      - "traefik.http.routers.strapi-traefik-web.rule=Host(`${CMS_TRAEFIK_HOST:-localhost}`)"
      - "traefik.http.routers.strapi-traefik-web.entrypoints=web"
      - "traefik.http.routers.strapi-traefik-web.service=strapi"
      - "traefik.http.routers.strapi-traefik-web.middlewares=redirect-to-https@file"
      - "traefik.http.routers.strapi-traefik-websecure.rule=Host(`${CMS_TRAEFIK_HOST:-localhost}`)"
      - "traefik.http.routers.strapi-traefik-websecure.entrypoints=websecure"
      - "traefik.http.routers.strapi-traefik-websecure.service=strapi"
      - "traefik.http.routers.strapi-traefik-websecure.tls.certresolver=letsencrypt"
      # Custom domain (set CMS_PUBLIC_HOST in compose env, e.g. cms.wearecodelovers.com)
      - "traefik.http.routers.strapi-custom-web.rule=Host(`${CMS_PUBLIC_HOST:-cms-custom-placeholder.invalid}`)"
      - "traefik.http.routers.strapi-custom-web.entrypoints=web"
      - "traefik.http.routers.strapi-custom-web.service=strapi"
      - "traefik.http.routers.strapi-custom-web.middlewares=redirect-to-https@file"
      - "traefik.http.routers.strapi-custom-websecure.rule=Host(`${CMS_PUBLIC_HOST:-cms-custom-placeholder.invalid}`)"
      - "traefik.http.routers.strapi-custom-websecure.entrypoints=websecure"
      - "traefik.http.routers.strapi-custom-websecure.service=strapi"
      - "traefik.http.routers.strapi-custom-websecure.tls.certresolver=letsencrypt"

  # Strapi PostgreSQL Database
  strapi-db:
    image: postgres:15-alpine
    container_name: agritech-strapi-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${STRAPI_DB_USER:-strapi}
      POSTGRES_PASSWORD: ${STRAPI_DB_PASSWORD}
      POSTGRES_DB: ${STRAPI_DB_NAME:-agritech_strapi}
    volumes:
      - strapi-db-data:/var/lib/postgresql/data
    networks:
      - strapi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  strapi-network:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  strapi-db-data:
